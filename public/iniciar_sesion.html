<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register_iniciar_sesion.css">
    <script src="./js/login.js" defer></script>
    <script src="./js/auth.js" defer></script>
    <title>Piezas MPS-400</title>
</head>
<body>
    <header>
        <nav>
            <a href="./index.html"><img src="./img/FRANLU.png" id="logo" alt="Logo"></a>
            <div>
                <div id="user-info" style="display: none;">
                    <span id="username-info"></span>
                    <button id="logout-btn">Salir</button>
                </div>
                <a href="./register.html" id="btn-register" class="guest-only">Registrarse</a>
                <a href="./iniciar_sesion.html" id="btn-login" class="guest-only">Iniciar Sesion</a>
                <a href="./cart.html" id="cart"><img src="./img/107831.png" alt="Carrito de compras"><span id="cuenta-carrito">0</span></a>
            </div>
        </nav>
    </header>
    <main>
        <div class="formulario">
            <h1>Iniciar Sesión</h1>

            <form method="post" id="login-form">

                <div class="username">
                    <input type="text" id="username" required>
                    <span></span>
                    <label>Nombre de usuario</label>
                </div>

                <div class="username">
                    <input type="password" id="password" required>
                    <span></span>
                    <label>Contraseña</label>
                </div>

                <a class="recordar" href="./olvido_contrasena.html">¿Olvidó su contraseña?</a>

                <input type="submit" value="Iniciar">
                <div class="registrarse">
                    ¿No tienes cuenta? <a href="./register.html">Regístrate</a>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <p>Creado por Francisco Barbero y Lucas Saavedra</p>
        <p>Proyecto maqueta MPS-400</p>
    </footer>
</body>
</html>
