<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    <script src="./js/cart.js" defer></script>
    <script src="./js/cartService.js" defer></script>
    <script src="./js/auth.js" defer></script>
    <title>Piezas MPS-400 Carrito</title>
</head>
<body>
    
    
    <header>
        <nav>
            <a href="./index.html"><img src="./img/FRANLU.png" id="logo" alt="Logo"></a>
            <div>
                <div id="user-info" style="display: none;">
                    <span id="username-info"></span>
                    <button id="logout-btn">Salir</button>
                </div>
                <a href="./register.html" id="btn-register" class="guest-only">Registrarse</a>
                <a href="./iniciar_sesion.html" id="btn-login" class="guest-only">Iniciar Sesion</a>
                <a href="./trazabilidad.html" id="btn-trazabilidad" style="display:none;">Mis pedidos</a>
                <a href="./cart.html" id="cart"><img src="./img/107831.png" alt="Carrito de compras"><span id="cuenta-carrito">0</span></a>
            </div>
        </nav>
    </header>
    <main>
        <p id="carrito-vacio">Ups! No hay productos en el carrito. <a href="./index.html">Agrega algunos</a></p>
        <section id="productos-conteiner"></section>
        <section id="totales">
            <p>Total unidades: <span id="unidades">0</span></p>
            <p>Total precio: $<span id="precio">0</span></p>
            <button id="comprar">Comprar</button>
            <button id="reiniciar">Reiniciar carrito</button>
        </section>
    </main>
    <footer>
        <p>Creado por Francisco Barbero y Lucas Savedra</p>
        <p>Proyecto maqueta MPS-400</p>
    </footer>
</body>
</html>
